welcome_html: |
  <h4>👋 Привет и добро пожаловать на void-shell!</h4>
  <p>Это приватный мессенджер для своих. Если коротко, тут можно:</p>
  <ul>
  <li>💬 Общаться и искать людей по имени (поиск вверху Element).</li>
  <li>📞 Звонить и видео — кнопка звонка в комнате (до 10 человек, есть демонстрация экрана).</li>
  <li>🤖 Спрашивать <b>Помощника</b> — <a href="https://matrix.to/#/@baibot:void-shell.com">@baibot</a> (ИИ: ответит на любой вопрос, понимает фото).</li>
  <li>🌐 Переводить и гифки — позови <a href="https://matrix.to/#/@bot.maubot:void-shell.com">@bot.maubot</a>: <code>!tr en текст</code> или <code>!giphy кот</code>.</li>
  <li>🔗 Подключить свой Telegram/WhatsApp/Discord/и т.д. — напиши боту моста команду <code>login</code>.</li>
  </ul>
  <p>Любые вопросы — пиши Помощнику <a href="https://matrix.to/#/@baibot:void-shell.com">@baibot</a> или админу <a href="https://matrix.to/#/@admin:void-shell.com">@admin</a>. Приятного общения! 🌙</p>
welcome_plain: |
  Добро пожаловать на void-shell! Помощник (ИИ): @baibot — ответит на любой вопрос, понимает фото. Переводчик/гифки: @bot.maubot (!tr en текст, !giphy кот). Звонки — кнопка в комнате. Мосты — напиши боту login. Вопросы — @baibot или @admin.
