# Пример для варианта B: внешний nginx (или Nginx Proxy Manager) терминирует TLS
# и проксирует все matrix-хосты на Matrix-сервер, который слушает обычный HTTP на :81.
# Замените example.com и MATRIX_HOST. TLS-сертификаты — ваши (например wildcard *.example.com).
#
# ВАЖНО: не добавляйте middleware/headers, меняющие запрос — это ломает Element Call и OAuth.
# Нужны проксирование WebSocket (Upgrade) и передача Host.

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matrix.example.com element.example.com admin.example.com call.example.com push.example.com example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    client_max_body_size 2048M;

    location / {
        proxy_pass http://MATRIX_HOST:81;     # внутренний Traefik Matrix (без TLS)
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80; listen [::]:80;
    server_name matrix.example.com element.example.com admin.example.com call.example.com push.example.com example.com;
    return 301 https://$host$request_uri;
}
